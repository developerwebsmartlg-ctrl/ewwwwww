<!DOCTYPE html><html><head><title>Dashboard - POSKASIR.XYZ</title><link rel="stylesheet" href="style.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script></head>
<body><div class="layout">
<div class="sidebar"><img src="https://cdn.photourl.com/member/2026-07-20-22f2e4d1-45a1-4459-a6f1-b1591f89e95a.png">
<a href="dashboard.html">Kasir</a><a href="kelola-menu.html">Kelola Barang</a><a href="riwayat.html">Riwayat</a><a onclick="logout()">Logout</a></div>
<div class="main"><div class="kasir-grid" id="menuGrid"></div><div class="struk"><h3>Struk Belanja</h3><div id="listStruk"></div><h4>Total: Rp<span id="total">0</span></h4><button onclick="selesaikan()">SELESAIKAN TRANSAKSI</button></div></div></div>
<div class="modal" id="modalStruk"><div class="modal-content" id="cetakArea"><button onclick="cetak()">CETAK THERMAL</button><button onclick="downloadPDF()">DOWNLOAD PDF</button></div></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, getDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
const firebaseConfig = {apiKey:"AIzaSyAS6vV7vmrTVfwvf8hKuu78gjdP_LXRFBY",authDomain:"poskasirxyz.firebaseapp.com",projectId:"poskasirxyz",storageBucket:"poskasirxyz.firebasestorage.app",messagingSenderId:"541115387509",appId:"1:541115387509:web:84b488359b814c1fdbb23c"};
const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
let uid="", cart=[], total=0;
onAuthStateChanged(auth, async (user)=>{ if(!user) return window.location='index.html';
  const snap = await getDoc(doc(db,"users",user.uid)); if(snap.data().status!=='aktif') return window.location='bayar.html';
  uid=user.uid; loadMenu();
});
async function loadMenu(){
  const snap = await getDocs(collection(db,"users",uid,"menus"));
  menuGrid.innerHTML=""; snap.forEach(d=>{ const m=d.data();
    menuGrid.innerHTML+=`<button onclick="addCart('${m.nama}',${m.harga})">${m.nama}<br>Rp${m.harga}</button>`
  })
}
window.addCart=(n,h)=>{ cart.push({n,h,qty:1}); renderStruk(); }
function renderStruk(){ total=0; listStruk.innerHTML=""; cart.forEach((i,idx)=>{ total+=i.h*i.qty; listStruk.innerHTML+=`${i.n} x${i.qty} = Rp${i.h*i.qty}<br>`}); total.innerText=total; }
window.selesaikan=async()=>{ if(cart.length==0) return alert("Keranjang kosong");
  const trx = {items:cart,total,tanggal:serverTimestamp()}; await addDoc(collection(db,"users",uid,"transaksi"),trx);
  showStruk(trx); cart=[]; renderStruk();
}
function showStruk(trx){
  let html=`<h2>POSKASIR.XYZ</h2><p>${new Date().toLocaleString()}</p><hr>`; trx.items.forEach(i=>{html+=`${i.n} x${i.qty} Rp${i.h*i.qty}<br>`});
  html+=`<hr><h3>TOTAL: Rp${trx.total}</h3>`; cetakArea.innerHTML=html+'<button onclick="cetak()">CETAK THERMAL</button><button onclick="downloadPDF()">DOWNLOAD PDF</button>'; modalStruk.style.display='flex';
}
window.cetak=()=>window.print();
window.downloadPDF=()=>{ const {jsPDF}=window.jspdf; const doc=new jsPDF({format:[80,200]}); doc.text(cetakArea.innerText,5,10); doc.save(`Struk-${Date.now()}.pdf`); }
window.logout=()=>signOut(auth);
</script></body></html>
