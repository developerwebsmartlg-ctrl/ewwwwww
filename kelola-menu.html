<!DOCTYPE html><html><head><title>Kelola Menu - POSKASIR.XYZ</title><link rel="stylesheet" href="style.css"></head>
<body><div class="layout"><div class="sidebar"><img src="https://cdn.photourl.com/member/2026-07-20-22f2e4d1-45a1-4459-a6f1-b1591f89e95a.png"><a href="dashboard.html">Kasir</a><a href="kelola-menu.html">Kelola Barang</a><a href="riwayat.html">Riwayat</a><a onclick="logout()">Logout</a></div>
<div class="main"><div class="container"><h1>Kelola Menu</h1><input id="nama" placeholder="Nama Menu"><input id="harga" type="number" placeholder="Harga"><button onclick="tambah()">Tambah</button><div id="listMenu"></div></div></div></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
const firebaseConfig = {apiKey:"AIzaSyAS6vV7vmrTVfwvf8hKuu78gjdP_LXRFBY",authDomain:"poskasirxyz.firebaseapp.com",projectId:"poskasirxyz",storageBucket:"poskasirxyz.firebasestorage.app",messagingSenderId:"541115387509",appId:"1:541115387509:web:84b488359b814c1fdbb23c"};
const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app); let uid="";
onAuthStateChanged(auth, (user)=>{ if(!user) return window.location='index.html'; uid=user.uid; load(); });
async function load(){ const snap=await getDocs(collection(db,"users",uid,"menus")); listMenu.innerHTML=""; snap.forEach(d=>{listMenu.innerHTML+=`${d.data().nama} Rp${d.data().harga} <button onclick="hapus('${d.id}')">Hapus</button><br>`})}
window.tambah=async()=>{ await addDoc(collection(db,"users",uid,"menus"),{nama:nama.value,harga:Number(harga.value)}); load(); }
window.hapus=async(id)=>{ await deleteDoc(doc(db,"users",uid,"menus",id)); load(); }
window.logout=()=>signOut(auth);
</script></body></html>
